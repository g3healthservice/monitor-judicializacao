name: Atualizar Radar de Judicializacao

# Automatiza a captura de novas judicializacoes e republica o dashboard.
# A chave do DataJud fica APENAS em Secrets (nunca no site publicado).
on:
  schedule:
    - cron: "0 */4 * * *"   # a cada 4 horas (mesma cadencia do Radar de Editais)
  workflow_dispatch: {}     # permite rodar sob demanda pelo botao "Run workflow"

permissions:
  contents: write           # para commitar o dashboard atualizado

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -e .

      - name: Ingerir DataJud + gerar dashboard
        env:
          DATAJUD_API_KEY: ${{ secrets.DATAJUD_API_KEY }}
          SALARIO_MINIMO: "1518.00"
          DATABASE_URL: "sqlite:///monitor.db"
          # DataJud e lento/instavel: timeout alto, pagina menor.
          HTTP_TIMEOUT_S: "90"
          INGEST_PAGE_SIZE: "20"
          HTTP_MAX_RETRIES: "4"
          INGEST_LOOKBACK_DIAS: "365"   # janela de demanda recente
          CONASEMS_MAX_POR_RUN: "60"    # coleta oncologia SUS em lotes (resume entre runs)
        run: |
          python -m src.cli init-db
          # Ingestao recente dos 27 TJs. Paginas baixas p/ run rapida e confiavel
          # (DataJud e lento); a janela recente + upsert idempotente acumula entre runs.
          python -m src.cli run --max-paginas 6
          # Enriquecimento: casos oncologicos SUS por municipio (Paineis CONASEMS/DATASUS)
          # para o painel "Oncologia SUS x Judicializacao". Falha aqui NAO derruba o build.
          python -m src.enrich.conasems_onco || echo "conasems_onco: coleta pulada (segue sem cruzamento)"
          python -m src.cli dashboard              # gera out/dashboard.html (sem gate)
          cp out/dashboard.html docs/index.html    # GitHub Pages serve a pasta docs/

      - name: Commit e push do dashboard
        run: |
          git config user.name  "g3-bot"
          git config user.email "g3.representante@gmail.com"
          git add -f docs/index.html monitor.db cache/conasems_onco.json   # -f: db/cache mantem checkpoint e resume entre runs
          git commit -m "Atualizacao automatica $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "sem mudancas"
          git push
